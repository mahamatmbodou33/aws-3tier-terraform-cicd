name: Deploy App Artifacts Prod

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ARTIFACT_BUCKET: three-tier-app-prod-artifacts

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package app1
        shell: pwsh
        run: Compress-Archive -Path ./apps/app1/* -DestinationPath ./app1.zip -Force

      - name: Upload app1 to S3
        run: aws s3 cp ./app1.zip s3://${{ env.ARTIFACT_BUCKET }}/app1/app1.zip

      - name: Package app2
        shell: pwsh
        run: Compress-Archive -Path ./apps/app2/* -DestinationPath ./app2.zip -Force

      - name: Upload app2 to S3
        run: aws s3 cp ./app2.zip s3://${{ env.ARTIFACT_BUCKET }}/app2/app2.zip

  refresh-app1:
    needs: build-and-upload
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Refresh app1 ASG safely
        shell: bash
        run: |
          STATUS=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name three-tier-app-prod-app1-asg \
            --region us-east-1 \
            --query 'InstanceRefreshes[0].Status' \
            --output text 2>/dev/null || echo "NONE")

          echo "Current app1 refresh status: $STATUS"

          if [ "$STATUS" = "InProgress" ] || [ "$STATUS" = "Pending" ]; then
            echo "Instance refresh already running for app1. Skipping."
            exit 0
          fi

          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name three-tier-app-prod-app1-asg \
            --region us-east-1 \
            --preferences '{"MinHealthyPercentage":90,"InstanceWarmup":300}'

  refresh-app2:
    needs: build-and-upload
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Refresh app2 ASG safely
        shell: bash
        run: |
          STATUS=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name three-tier-app-prod-app2-asg \
            --region us-east-1 \
            --query 'InstanceRefreshes[0].Status' \
            --output text 2>/dev/null || echo "NONE")

          echo "Current app2 refresh status: $STATUS"

          if [ "$STATUS" = "InProgress" ] || [ "$STATUS" = "Pending" ]; then
            echo "Instance refresh already running for app2. Skipping."
            exit 0
          fi

          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name three-tier-app-prod-app2-asg \
            --region us-east-1 \
            --preferences '{"MinHealthyPercentage":90,"InstanceWarmup":300}'