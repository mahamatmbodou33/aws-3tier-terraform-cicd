name: Deploy App Artifacts Prod

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ARTIFACT_BUCKET: three-tier-app-prod-artifacts

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      app1_changed: ${{ steps.filter.outputs.app1 }}
      app2_changed: ${{ steps.filter.outputs.app2 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed app paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app1:
              - 'apps/app1/**'
            app2:
              - 'apps/app2/**'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package app1
        if: steps.filter.outputs.app1 == 'true' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: Compress-Archive -Path ./apps/app1/* -DestinationPath ./app1.zip -Force

      - name: Upload app1 to S3
        if: steps.filter.outputs.app1 == 'true' || github.event_name == 'workflow_dispatch'
        run: aws s3 cp ./app1.zip s3://${{ env.ARTIFACT_BUCKET }}/app1/app1.zip

      - name: Package app2
        if: steps.filter.outputs.app2 == 'true' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: Compress-Archive -Path ./apps/app2/* -DestinationPath ./app2.zip -Force

      - name: Upload app2 to S3
        if: steps.filter.outputs.app2 == 'true' || github.event_name == 'workflow_dispatch'
        run: aws s3 cp ./app2.zip s3://${{ env.ARTIFACT_BUCKET }}/app2/app2.zip

  refresh-app1:
    needs: build-and-upload
    if: needs.build-and-upload.outputs.app1_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Refresh app1 ASG
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name three-tier-app-prod-app1-asg \
            --region us-east-1 \
            --preferences '{"MinHealthyPercentage":90,"InstanceWarmup":300}'

  refresh-app2:
    needs: build-and-upload
    if: needs.build-and-upload.outputs.app2_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Refresh app2 ASG
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name three-tier-app-prod-app2-asg \
            --region us-east-1 \
            --preferences '{"MinHealthyPercentage":90,"InstanceWarmup":300}'