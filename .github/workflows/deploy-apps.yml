name: Deploy App Artifacts

on:
  push:
    branches: [main]
    paths:
      - 'apps/app1/**'
      - 'apps/app2/**'
      - '.github/workflows/deploy-apps.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ARTIFACT_BUCKET: mbodou-dev-artifacts

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    outputs:
      app1_changed: ${{ steps.filter.outputs.app1 }}
      app2_changed: ${{ steps.filter.outputs.app2 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app1:
              - 'apps/app1/**'
            app2:
              - 'apps/app2/**'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package app1
        if: steps.filter.outputs.app1 == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cd apps/app1
          zip -r ../../app1.zip .

      - name: Upload app1 artifact
        if: steps.filter.outputs.app1 == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          aws s3 cp app1.zip s3://${{ env.ARTIFACT_BUCKET }}/app1/app1.zip

      - name: Package app2
        if: steps.filter.outputs.app2 == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cd apps/app2
          zip -r ../../app2.zip .

      - name: Upload app2 artifact
        if: steps.filter.outputs.app2 == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          aws s3 cp app2.zip s3://${{ env.ARTIFACT_BUCKET }}/app2/app2.zip

  refresh-app1:
    runs-on: ubuntu-latest
    needs: build-and-upload
    if: needs.build-and-upload.outputs.app1_changed == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start app1 instance refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name mbodou-dev-app1-asg \
            --preferences '{"MinHealthyPercentage":50,"InstanceWarmup":300}'

  refresh-app2:
    runs-on: ubuntu-latest
    needs: build-and-upload
    if: needs.build-and-upload.outputs.app2_changed == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start app2 instance refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name mbodou-dev-app2-asg \
            --preferences '{"MinHealthyPercentage":50,"InstanceWarmup":300}'