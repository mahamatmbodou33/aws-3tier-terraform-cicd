name: Deploy App Artifacts

on:
  push:
    branches:
      - main
    paths:
      - 'apps/app1/**'
      - 'apps/app2/**'
      - '.github/workflows/deploy-apps.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ARTIFACT_BUCKET: mbodou-dev-artifacts

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      app1_changed: ${{ steps.filter.outputs.app1 }}
      app2_changed: ${{ steps.filter.outputs.app2 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed app paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app1:
              - 'apps/app1/**'
            app2:
              - 'apps/app2/**'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package app1
        if: steps.filter.outputs.app1 == 'true' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: Compress-Archive -Path .\apps\app1\* -DestinationPath .\app1.zip -Force

      - name: Upload app1 to S3
        if: steps.filter.outputs.app1 == 'true' || github.event_name == 'workflow_dispatch'
        run: aws s3 cp ./app1.zip s3://${{ env.ARTIFACT_BUCKET }}/app1/app1.zip

      - name: Package app2
        if: steps.filter.outputs.app2 == 'true' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: Compress-Archive -Path .\apps\app2\* -DestinationPath .\app2.zip -Force

      - name: Upload app2 to S3
        if: steps.filter.outputs.app2 == 'true' || github.event_name == 'workflow_dispatch'
        run: aws s3 cp ./app2.zip s3://${{ env.ARTIFACT_BUCKET }}/app2/app2.zip

  refresh-app1:
    needs: build-and-upload
    if: needs.build-and-upload.outputs.app1_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - name: Start app1 instance refresh if none is running
        shell: bash
        run: |
          STATUS=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name mbodou-dev-app1-asg \
            --region us-east-1 \
            --query 'InstanceRefreshes[0].Status' \
            --output text 2>/dev/null || echo "NONE")

          echo "Current app1 refresh status: $STATUS"

          if [ "$STATUS" = "InProgress" ] || [ "$STATUS" = "Pending" ]; then
            echo "Instance refresh already running for app1. Skipping new refresh."
            exit 0
          fi

          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name mbodou-dev-app1-asg \
            --region us-east-1 \
            --preferences '{"MinHealthyPercentage":90,"InstanceWarmup":300}'

  refresh-app2:
    needs: build-and-upload
    if: needs.build-and-upload.outputs.app2_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - name: Start app2 instance refresh if none is running
        shell: bash
        run: |
          STATUS=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name mbodou-dev-app2-asg \
            --region us-east-1 \
            --query 'InstanceRefreshes[0].Status' \
            --output text 2>/dev/null || echo "NONE")

          echo "Current app2 refresh status: $STATUS"

          if [ "$STATUS" = "InProgress" ] || [ "$STATUS" = "Pending" ]; then
            echo "Instance refresh already running for app2. Skipping new refresh."
            exit 0
          fi

          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name mbodou-dev-app2-asg \
            --region us-east-1 \
            --preferences '{"MinHealthyPercentage":90,"InstanceWarmup":300}'